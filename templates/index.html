<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Atlassian Agent Web</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>

  <body>
    <div class="form-container">
      <form class="form" method="POST">
        <p>Выберите сервер:</p>
        <div class="server-list">
          {% for server in servers %}
          <label class="server-option">
            <input
              type="radio"
              name="server_id"
              value="{{ server.id }}"
              required
              {%
              if
              loop.first
              %}checked{%
              endif
              %}
            />
            <span class="server-id">{{ server.id }}</span>
            <span class="server-desc">{{ server.description }}</span>
          </label>
          {% endfor %}
        </div>

        <p>Введите код плагина:</p>
        <input
          type="text"
          id="plugin_code"
          name="plugin_code"
          placeholder="Код плагина"
          required
        />

        <div class="result-wrapper">
          <label for="exec_result">Ключ плагина:</label>
          <div class="input-with-button">
            <textarea
              class="exec"
              id="exec_result"
              name="exec_result"
              placeholder="Здесь появится результат выполнения команды"
              readonly
            >
{{ exec_result }}</textarea
            >
            <!-- Добавил id="copy-btn" -->
            <button
              type="button"
              id="copy-btn"
              class="copy-btn"
              title="Копировать в буфер обмена"
              aria-label="Copy"
            >
              <svg
                viewBox="0 0 24 24"
                width="20"
                height="20"
                fill="currentColor"
              >
                <path
                  d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v10z"
                />
              </svg>
            </button>
          </div>
        </div>

        <button type="submit">Сгенерировать ключ</button>
      </form>

      <form class="form">
        <p>
          Текущая команда для выполнения (код плагина и сервера будут
          подставлены автоматически):
        </p>
        <pre><code>{{ exec_command }}</code></pre>
      </form>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const copyBtn = document.getElementById("copy-btn");
        const execResult = document.getElementById("exec_result");

        // Универсальная функция копирования — работает и на HTTP, и на HTTPS
        async function copyTextToClipboard(text) {
          // 1. Попытка использовать современный Clipboard API (только HTTPS/localhost)
          if (navigator.clipboard && window.isSecureContext) {
            try {
              await navigator.clipboard.writeText(text);
              return true;
            } catch (e) {
              console.warn("Clipboard API не удался:", e);
            }
          }

          // 2. Fallback через execCommand — работает на HTTP
          try {
            const tempTextArea = document.createElement("textarea");
            tempTextArea.value = text;
            tempTextArea.setAttribute("readonly", "");
            tempTextArea.style.position = "fixed";
            tempTextArea.style.top = "0";
            tempTextArea.style.left = "-9999px";
            tempTextArea.style.width = "1px";
            tempTextArea.style.height = "1px";
            tempTextArea.style.padding = "0";
            tempTextArea.style.border = "none";
            tempTextArea.style.outline = "none";
            tempTextArea.style.boxShadow = "none";
            tempTextArea.style.background = "transparent";

            document.body.appendChild(tempTextArea);
            tempTextArea.focus();
            if (tempTextArea.createTextRange) {
              const range = tempTextArea.createTextRange();
              range.moveStart("character", 0);
              range.moveEnd("character", tempTextArea.value.length);
              range.select();
            } else {
              tempTextArea.select();
            }

            const success = document.execCommand("copy");
            document.body.removeChild(tempTextArea);

            if (!success) {
              throw new Error("execCommand('copy') вернул false");
            }
            return true;
          } catch (err) {
            console.error("Ошибка копирования:", err);
            return false;
          }
        }

        if (copyBtn && execResult) {
          copyBtn.addEventListener("click", async function () {
            const text = execResult.value.trim();
            if (!text) {
              alert("Нет текста для копирования");
              return;
            }

            const success = await copyTextToClipboard(text);

            if (success) {
              const originalSVG = copyBtn.innerHTML;
              copyBtn.innerHTML = `
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                  <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" />
                </svg>`;
              copyBtn.title = "Скопировано!";
              copyBtn.disabled = true;

              setTimeout(() => {
                copyBtn.innerHTML = originalSVG;
                copyBtn.title = "Копировать в буфер обмена";
                copyBtn.disabled = false;
              }, 2000);
            } else {
              alert(
                "Не удалось скопировать. Попробуйте выделить текст вручную и нажать Ctrl+C.",
              );
            }
          });
        }
      });
    </script>
  </body>
</html>
